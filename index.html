<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>海洋生物搜尋網站</title>

<style>

body{

    font-family: Arial, sans-serif;

    background-image: url('/images/ocean.jpg');

    background-size: cover;

    background-position: center;

    background-repeat: no-repeat;

    height: 100vh;

    margin: 0;

    text-align: center;

}

.container{

    margin-top: 180px;

}

h1{

    color: white;

    font-size: 50px;

    text-shadow: 3px 3px 8px black;

}

p{

    color: white;

    font-size: 20px;

    text-shadow: 2px 2px 5px black;

}

input{

    width: 320px;

    padding: 12px;

    border-radius: 10px;

    border: none;

    font-size: 16px;

}

button{

    padding: 12px 20px;

    border: none;

    border-radius: 10px;

    background-color: #0077cc;

    color: white;

    font-size: 16px;

    cursor: pointer;

}

button:hover{

    background-color: #005fa3;

}

</style>

</head>

<body>

<div class="container">

    <h1>🌊 海洋生物搜尋網站 🐠</h1>

    <p>探索神秘的海洋世界</p>

    <form action="/search" method="get">

        <input type="text"
               name="keyword"
               placeholder="請輸入海洋生物名稱">

        <button type="submit">搜尋</button>

    </form>

</div>

</body>
</html>
